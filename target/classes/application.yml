spring:
  application:
    name: ledger

  datasource:
    url: jdbc:postgresql://localhost:5432/financedb
    username: ${DB_USERNAME:financeuser}
    password: ${DB_PASSWORD:financepass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema - JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis
    redis:
      time-to-live: 300000       # 5 minutes default TTL

# JWT config - override secret via env var in production
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiration: 900000       # 15 minutes
    refresh-token-expiration: 604800000   # 7 days

  scheduling:
    budget-alert-cron: "0 0 8 * * *"     # Every day at 8am

server:
  port: 8080

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ledger: DEBUG
    org.springframework.security: INFO
